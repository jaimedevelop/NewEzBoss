[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Proxy all /proxy/* requests to the Netlify Function
[[redirects]]
  from = "/proxy/*"
  to = "/.netlify/functions/proxy/:splat"
  status = 200

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200